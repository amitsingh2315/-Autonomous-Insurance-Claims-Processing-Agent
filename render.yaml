services:
  # 1. Backend API (FastAPI)
  - type: web
    name: insurance-agent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. Frontend UI (Static Site)
  - type: web
    name: insurance-agent-frontend
    env: static
    buildCommand: ""
    staticPublishPath: ./frontend
